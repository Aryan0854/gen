name: Daily Commit

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          echo "$(date)" >> activity.txt
          git config --global user.name "Aryan0854"
          git config --global user.email "seema.aryan.arnav@gmail.com"
          git add .
          git commit -m "daily commit"
          git push